---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ocp-troubleshooter
  namespace: coding-assistant
  labels:
    app: ocp-troubleshooter
    app.kubernetes.io/part-of: ocp-troubleshooter-demo
spec:
  to:
    kind: Service
    name: ocp-troubleshooter
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

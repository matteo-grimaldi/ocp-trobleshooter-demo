---
# MCPServer CR — requires the MCP lifecycle operator (RHOAI 3.4+).
# The operator creates the Deployment, Service, and health probes
# automatically and registers the server in the OpenShift AI MCP catalog.
apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: prometheus-mcp-server
  namespace: coding-assistant
spec:
  extraLabels:
    app.kubernetes.io/part-of: ocp-troubleshooter-demo

  source:
    type: ContainerImage
    containerImage:
      ref: image-registry.openshift-image-registry.svc:5000/coding-assistant/prometheus-mcp-server:latest

  config:
    port: 8080
    path: /mcp
    env:
      - name: MCP_PORT
        value: "8080"
      - name: THANOS_URL
        value: "https://thanos-querier.openshift-monitoring.svc:9091"
      - name: PYTHONUNBUFFERED
        value: "1"

  runtime:
    serviceAccountName: ocp-troubleshooter-sa
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
    security:
      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        capabilities:
          drop:
            - ALL
    health:
      livenessProbe:
        tcpSocket:
          port: 8080
        initialDelaySeconds: 10
        periodSeconds: 10
        failureThreshold: 3
      readinessProbe:
        tcpSocket:
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 3

  mcp:
    stateless: true

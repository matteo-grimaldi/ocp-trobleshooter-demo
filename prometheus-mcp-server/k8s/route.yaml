---
# Optional external Route — useful for testing or accessing the MCP
# server from outside the cluster.  Not required for in-cluster agents.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: prometheus-mcp-server
  namespace: coding-assistant
  labels:
    app: prometheus-mcp-server
    app.kubernetes.io/part-of: ocp-troubleshooter-demo
spec:
  to:
    kind: Service
    name: prometheus-mcp-server
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

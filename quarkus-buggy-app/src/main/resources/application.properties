# Application identity
quarkus.application.name=buggy-demo-app
quarkus.application.version=1.0.0

# HTTP
quarkus.http.port=8080

# Metrics — expose /q/metrics with Prometheus format
quarkus.micrometer.enabled=true
quarkus.micrometer.registry-enabled-default=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# Health checks — expose /q/health, /q/health/live, /q/health/ready
quarkus.smallrye-health.root-path=/q/health

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.demo".level=DEBUG

# Container image (jib) — built via: ./mvnw package -Dquarkus.container-image.build=true -Dquarkus.container-image.push=true
quarkus.container-image.registry=image-registry.openshift-image-registry.svc:5000
quarkus.container-image.group=demo-app
quarkus.container-image.name=buggy-demo-app
quarkus.container-image.tag=latest
quarkus.container-image.build=false
quarkus.container-image.push=false
quarkus.container-image.insecure=true

# Kubernetes / OpenShift
quarkus.kubernetes.namespace=demo-app
quarkus.kubernetes.part-of=ocp-troubleshooter-demo
quarkus.openshift.route.expose=true
